<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGrad" x1="22" y1="14" x2="98" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3B35"/>
      <stop offset="1" stop-color="#B91518"/>
    </linearGradient>

    <linearGradient id="darkGrad" x1="30" y1="18" x2="92" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A2A2E"/>
      <stop offset="1" stop-color="#151517"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- dark rounded background -->
  <rect x="10" y="10" width="100" height="100" rx="26" fill="url(#darkGrad)" filter="url(#shadow)"/>

  <!-- red glow circle -->
  <circle cx="60" cy="54" r="34" fill="#FF2D2D" opacity="0.14"/>

  <!-- main red icon circle -->
  <circle cx="60" cy="54" r="29" fill="url(#redGrad)"/>

  <!-- product box -->
  <path d="M42 50L60 40L78 50V70L60 80L42 70V50Z"
        fill="#FFFFFF"
        opacity="0.96"/>

  <!-- box left face -->
  <path d="M42 50L60 60V80L42 70V50Z"
        fill="#F2F2F2"
        opacity="0.95"/>

  <!-- box right face -->
  <path d="M78 50L60 60V80L78 70V50Z"
        fill="#DCDCDC"
        opacity="0.95"/>

  <!-- box top face -->
  <path d="M42 50L60 40L78 50L60 60L42 50Z"
        fill="#FFFFFF"/>

  <!-- red box seam -->
  <path d="M60 60V79"
        stroke="#E92525"
        stroke-width="3"
        stroke-linecap="round"/>

  <path d="M51 45L69 55"
        stroke="#E92525"
        stroke-width="2.5"
        stroke-linecap="round"
        opacity="0.9"/>

  <!-- NEW badge -->
  <rect x="63" y="32" width="28" height="15" rx="7.5" fill="#3B1617" opacity="0.95"/>
  <text x="77" y="43"
        text-anchor="middle"
        font-size="8"
        font-weight="800"
        font-family="Arial, sans-serif"
        fill="#FFFFFF">
    NEW
  </text>

  <!-- sparkle -->
  <path d="M37 35L39.5 41L46 43.5L39.5 46L37 52L34.5 46L28 43.5L34.5 41L37 35Z"
        fill="#FFFFFF"
        opacity="0.9"/>

  <circle cx="83" cy="76" r="3" fill="#FFFFFF" opacity="0.85"/>

</svg>