<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGradMember" x1="22" y1="14" x2="98" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF3B35"/>
      <stop offset="1" stop-color="#B91518"/>
    </linearGradient>

    <linearGradient id="darkGradMember" x1="30" y1="18" x2="92" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A2A2E"/>
      <stop offset="1" stop-color="#151517"/>
    </linearGradient>

    <filter id="shadowMember" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- dark rounded background -->
  <rect x="10" y="10" width="100" height="100" rx="26" fill="url(#darkGradMember)" filter="url(#shadowMember)"/>

  <!-- red glow -->
  <circle cx="60" cy="54" r="34" fill="#FF2D2D" opacity="0.14"/>

  <!-- main red circle -->
  <circle cx="60" cy="54" r="29" fill="url(#redGradMember)"/>

  <!-- QR code blocks -->
  <rect x="39" y="35" width="18" height="18" rx="3" fill="#FFFFFF"/>
  <rect x="44" y="40" width="8" height="8" rx="1.5" fill="#D91F22"/>

  <rect x="63" y="35" width="18" height="18" rx="3" fill="#FFFFFF"/>
  <rect x="68" y="40" width="8" height="8" rx="1.5" fill="#D91F22"/>

  <rect x="39" y="59" width="18" height="18" rx="3" fill="#FFFFFF"/>
  <rect x="44" y="64" width="8" height="8" rx="1.5" fill="#D91F22"/>

  <!-- QR small modules -->
  <rect x="60" y="57" width="5" height="5" rx="1" fill="#FFFFFF"/>
  <rect x="68" y="57" width="5" height="5" rx="1" fill="#FFFFFF"/>
  <rect x="60" y="66" width="5" height="5" rx="1" fill="#FFFFFF"/>
  <rect x="75" y="64" width="5" height="5" rx="1" fill="#FFFFFF"/>
  <rect x="72" y="72" width="8" height="5" rx="1" fill="#FFFFFF"/>

  <!-- member card -->
  <rect x="58" y="56" width="27" height="20" rx="6" fill="#FFFFFF"/>

  <!-- user avatar inside card -->
  <circle cx="67" cy="64" r="3.8" fill="#D91F22"/>
  <path d="M61.5 72C61.5 68.5 64.3 66 67 66C69.7 66 72.5 68.5 72.5 72V73H61.5V72Z"
        fill="#D91F22"/>

  <!-- card text lines -->
  <rect x="75" y="62" width="7" height="2.8" rx="1.4" fill="#D91F22"/>
  <rect x="75" y="68" width="7" height="2.8" rx="1.4" fill="#D91F22"/>

  <!-- small highlight -->
  <circle cx="46" cy="32" r="3" fill="#FFFFFF" opacity="0.7"/>

</svg>